<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geocodificador Guatemala — Unicomer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #1a1a18; }
  .subtitle { font-size: 13px; color: #888780; margin-bottom: 2rem; }
  .card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
  label { font-size: 13px; color: #5f5e5a; display: block; margin-bottom: 6px; font-weight: 500; }
  input[type="text"], textarea {
    width: 100%; border: 0.5px solid #d3d1c7; border-radius: 8px;
    padding: 9px 12px; font-size: 14px; font-family: inherit;
    background: #fff; color: #1a1a18; outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: #888780; }
  input[type="text"].mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
  textarea { resize: vertical; line-height: 1.6; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 20px; font-size: 14px; font-weight: 500;
    border: 0.5px solid #d3d1c7; border-radius: 8px;
    background: #1a1a18; color: #fff; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: #2c2c2a; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #b4b2a9; cursor: not-allowed; }
  .btn-secondary { background: #fff; color: #1a1a18; }
  .btn-secondary:hover { background: #f1efe8; }
  .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
  .status-msg { font-size: 13px; color: #5f5e5a; }
  .progress-wrap { margin-top: 1rem; display: none; }
  .progress-bar { height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a1a18; border-radius: 2px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 12px; color: #888780; margin-top: 5px; }
  .results-wrap { display: none; margin-top: 1.25rem; }
  .table-scroll { overflow-x: auto; border: 0.5px solid #d3d1c7; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
  thead tr { background: #f5f4f0; }
  th { padding: 10px 12px; text-align: left; font-weight: 500; color: #5f5e5a; border-bottom: 0.5px solid #d3d1c7; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 0.5px solid #f1efe8; color: #1a1a18; word-break: break-word; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f5f4f0; }
  .mono-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; text-align: center; white-space: nowrap; }
  .status-ok { color: #3b6d11; font-weight: 500; }
  .status-err { color: #a32d2d; font-weight: 500; }
  .badge-ok { display: inline-flex; align-items: center; gap: 4px; background: #eaf3de; color: #3b6d11; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
  .badge-err { display: inline-flex; align-items: center; gap: 4px; background: #fcebeb; color: #a32d2d; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
  .summary { display: flex; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; }
  .metric { background: #f5f4f0; border-radius: 8px; padding: 10px 16px; }
  .metric-val { font-size: 22px; font-weight: 600; }
  .metric-lbl { font-size: 12px; color: #888780; margin-top: 2px; }
  .tip { font-size: 12px; color: #888780; margin-top: 8px; }
  svg.icon { width: 14px; height: 14px; display: inline-block; vertical-align: -2px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="container">
  <h1>Geocodificador de Direcciones</h1>
  <p class="subtitle">Guatemala · Powered by Google Maps Geocoding API</p>

  <div class="card">
    <label>API Key de Google Maps</label>
    <div style="display:flex; gap:8px; align-items:center;">
      <input type="text" id="apiKey" class="mono" placeholder="AIzaSy..." oninput="saveKey()" style="flex:1;" />
      <span id="keySaved" style="font-size:12px; color:#3b6d11; white-space:nowrap; display:none;">✓ Guardada</span>
    </div>
    <p class="tip">Se guarda automáticamente en tu navegador. Conseguila en console.cloud.google.com → APIs & Services → Credentials</p>
  </div>

  <div class="card">
    <label>Direcciones a geocodificar (una por línea)</label>
    <textarea id="addressInput" rows="10" placeholder="5a Avenida 12-34, Zona 1, Guatemala&#10;Calzada Roosevelt 22-50, Zona 11&#10;13 Calle 8-44, Zona 10, Guatemala City"></textarea>

    <div class="btn-row">
      <button class="btn" id="geocodeBtn" onclick="startGeocoding()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Geocodificar
      </button>
      <button class="btn btn-secondary" id="copyBtn" onclick="copyResults()" style="display:none;">
        <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copiar para Excel
      </button>
      <button class="btn btn-secondary" id="downloadBtn" onclick="downloadCSV()" style="display:none;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar CSV
      </button>
      <span class="status-msg" id="statusMsg"></span>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-text" id="progressText"></p>
    </div>
  </div>

  <div class="results-wrap" id="resultsWrap">
    <div class="summary" id="summaryCards"></div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:26%">Dirección original</th>
            <th style="width:30%">Dirección normalizada</th>
            <th style="width:12%">Latitud</th>
            <th style="width:12%">Longitud</th>
            <th style="width:10%">Precisión</th>
            <th style="width:10%">Estado</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let resultsData = [];

window.onload = function() {
  const saved = localStorage.getItem('gmaps_api_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('keySaved').style.display = 'inline';
  }
};

function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (val.length > 10) {
    localStorage.setItem('gmaps_api_key', val);
    document.getElementById('keySaved').style.display = 'inline';
  } else {
    localStorage.removeItem('gmaps_api_key');
    document.getElementById('keySaved').style.display = 'none';
  }
}

async function startGeocoding() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const raw = document.getElementById('addressInput').value.trim();

  if (!apiKey) { setStatus('Ingresá tu API Key primero.'); return; }
  if (!raw) { setStatus('Pegá al menos una dirección.'); return; }

  const addresses = raw.split('\n').map(a => a.trim()).filter(a => a.length > 0);
  resultsData = [];

  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('resultsWrap').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('downloadBtn').style.display = 'none';
  document.getElementById('geocodeBtn').disabled = true;
  setStatus('');

  const body = document.getElementById('resultsBody');
  body.innerHTML = '';

  for (let i = 0; i < addresses.length; i++) {
    const addr = addresses[i];
    setProgress(i, addresses.length, addr);

    let result = { original: addr, normalized: '', lat: '', lng: '', precision: '', status: 'error' };

    try {
      const query = encodeURIComponent(addr + ', Guatemala');
      const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${query}&key=${apiKey}&region=gt&language=es`;
      const resp = await fetch(url);
      const data = await resp.json();

      if (data.status === 'OK' && data.results.length > 0) {
        const r = data.results[0];
        result.normalized = r.formatted_address;
        result.lat = r.geometry.location.lat.toFixed(6);
        result.lng = r.geometry.location.lng.toFixed(6);
        result.precision = translateType(r.geometry.location_type);
        result.status = 'ok';
      } else if (data.status === 'ZERO_RESULTS') {
        result.status = 'no encontrado';
      } else if (data.status === 'REQUEST_DENIED') {
        result.status = 'API key inválida';
      } else {
        result.status = data.status || 'error';
      }
    } catch (e) {
      result.status = 'error: ' + e.message;
    }

    resultsData.push(result);

    const tr = document.createElement('tr');
    const isOk = result.status === 'ok';
    tr.innerHTML = `
      <td>${esc(addr)}</td>
      <td style="color:#5f5e5a">${esc(result.normalized)}</td>
      <td class="mono-cell">${result.lat}</td>
      <td class="mono-cell">${result.lng}</td>
      <td class="mono-cell" style="font-family:inherit;font-size:12px;color:#888780">${result.precision}</td>
      <td style="text-align:center">
        <span class="${isOk ? 'badge-ok' : 'badge-err'}">${isOk ? '✓ OK' : esc(result.status)}</span>
      </td>
    `;
    body.appendChild(tr);
    await sleep(100);
  }

  setProgress(addresses.length, addresses.length, '');
  document.getElementById('progressText').textContent = `Listo — ${addresses.length} dirección${addresses.length !== 1 ? 'es' : ''} procesada${addresses.length !== 1 ? 's' : ''}.`;

  const ok = resultsData.filter(r => r.status === 'ok').length;
  const err = resultsData.length - ok;
  document.getElementById('summaryCards').innerHTML = `
    <div class="metric"><div class="metric-val">${resultsData.length}</div><div class="metric-lbl">Total</div></div>
    <div class="metric"><div class="metric-val" style="color:#3b6d11">${ok}</div><div class="metric-lbl">Geocodificadas</div></div>
    <div class="metric"><div class="metric-val" style="color:#a32d2d">${err}</div><div class="metric-lbl">Con error</div></div>
  `;

  document.getElementById('resultsWrap').style.display = 'block';
  document.getElementById('copyBtn').style.display = '';
  document.getElementById('downloadBtn').style.display = '';
  document.getElementById('geocodeBtn').disabled = false;
}

function translateType(t) {
  const map = { ROOFTOP: 'Exacta', RANGE_INTERPOLATED: 'Interpolada', GEOMETRIC_CENTER: 'Centro', APPROXIMATE: 'Aprox.' };
  return map[t] || t || '';
}

function setProgress(i, total, addr) {
  const pct = Math.round((i / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  if (addr) document.getElementById('progressText').textContent = `Procesando ${i + 1} de ${total}: ${addr.substring(0, 60)}...`;
}

function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyResults() {
  if (!resultsData.length) return;
  const header = 'Dirección original\tDirección normalizada\tLatitud\tLongitud\tPrecisión\tEstado';
  const rows = resultsData.map(r => `${r.original}\t${r.normalized}\t${r.lat}\t${r.lng}\t${r.precision}\t${r.status}`);
  navigator.clipboard.writeText([header, ...rows].join('\n')).then(() => {
    setStatus('¡Copiado! Pegalo directo en Excel.');
    setTimeout(() => setStatus(''), 3000);
  });
}

function downloadCSV() {
  if (!resultsData.length) return;
  const header = 'Dirección original,Dirección normalizada,Latitud,Longitud,Precisión,Estado';
  const rows = resultsData.map(r => [r.original, r.normalized, r.lat, r.lng, r.precision, r.status].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = '\uFEFF' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'geocodificacion_guatemala.csv'; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
